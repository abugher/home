-- ${tab} or ${goto} can be used to create columns with variable width text.
-- Graphs with no width parameter fill the remainder of the line.  Multiple
-- graphs per line seem to overflow the line.
--
-- I have the CPU graphs in a 4x4 grid, using fixed widths.  That will only
-- look right on one screen resolution.  Find a better way to make columns out
-- of graphs, if possible.

-- Bars generally look good in line with text.  Graphs are misaligned with
-- text.  If this can be fixed, graphs can be placed in line with text, columns
-- will be more consistent, and more lines can fit.

-- top* values are space padded, making columns look funny.
-- 
-- ${top cpu 1} disagrees with `top`.  This may be the difference between
-- percent of one core and percent of all cores.
--
-- I do not see a way to list the top consumers of network I/O.

-- Don't use ${acpitemp}.  ${acpitemp} seems to show only thermal zone zero.
-- Thermal zone zero thinks it is below room temperature.  Seems unlikely.
--
--   0 aaron@obsidian:~/.config/conky$ for zone in /sys/class/thermal/thermal_zone*; do printf '%-15s-  %s°C\n' "$(cat "${zone}/type")" "$(sed -E 's/(...)$/.\1/' < "${zone}/temp")"; done
-- acpitz         -  16.800°C
-- acpitz         -  27.800°C
-- x86_pkg_temp   -  46.000°C
-- iwlwifi_1      -  34.000°C
--   0 aaron@obsidian:~/.config/conky$
-- 
-- Neither "acpitz" value ever seems to change, on my system.  Assume no
-- motherboard temperature is actually available.
--
-- From skimming the web, acpitz should be on the motherboard near the CPU
-- socket, and x86_pkg_temp should be on/in the CPU die.  iwlwifi_1 is
-- presumably the wireless card.
--
-- I wrote a script called "temperature" to display thermal zone readings as
-- degrees instead of thousandths of a degree.  It seems wasteful to run that
-- several times every time the display updates, but it works.  It also handles
-- storage temperatures.

-- execgraph seems to not show the scale of the graph, as other graphs do.

-- ${stippled_hr} looks purple sometimes.  Is that a font/color
-- misconfiguration, or is that some kind of optical illusion?  Right now the
-- one down by the word "network" looks very purple, and the one by "storage"
-- slightly lavender.


conky.text = [[
OS  ${stippled_hr}
  uptime: ${goto 200}${uptime}
  update status: ${goto 200}${tail /var/log/update_debian.ret 1}

processing  ${stippled_hr}
  CPU:
    ${cpubar cpu1 6,620} ${cpubar cpu2 6,620} ${cpubar cpu3 6,620} ${cpubar cpu4 6,620}
    ${cpugraph cpu1 20,620} ${cpugraph cpu2 20,620} ${cpugraph cpu3 20,620} ${cpugraph cpu4 20,620}
    ${cpubar cpu5 6,620} ${cpubar cpu6 6,620} ${cpubar cpu7 6,620} ${cpubar cpu8 6,620}
    ${cpugraph cpu5 20,620} ${cpugraph cpu6 20,620} ${cpugraph cpu7 20,620} ${cpugraph cpu8 20,620}
    ${cpubar cpu9 6,620} ${cpubar cpu10 6,620} ${cpubar cpu11 6,620} ${cpubar cpu12 6,620}
    ${cpugraph cpu9 20,620} ${cpugraph cpu10 20,620} ${cpugraph cpu11 20,620} ${cpugraph cpu12 20,620}
    ${cpubar cpu13 6,620} ${cpubar cpu14 6,620} ${cpubar cpu15 6,620} ${cpubar cpu16 6,620}
    ${cpugraph cpu13 20,620} ${cpugraph cpu14 20,620} ${cpugraph cpu15 20,620} ${cpugraph cpu16 20,620}
    top consumer:       ${goto 200}[${top name 1}-${top pid 1}]                                         ${goto 500}(${top cpu 1}%)
  load:                 ${goto 200}${loadavg 1}, ${loadavg 2}, ${loadavg 3} 
    ${loadgraph}
  processes:
    total:              ${goto 200}${processes}  
    running:            ${goto 200}${running_processes}
  threads:
    total:              ${goto 200}${threads}  
    running:            ${goto 200}${running_threads}
  temperature:          ${goto 200}${exec temperature cpu}°C
    ${execgraph "temperature cpu" 150}

memory  ${stippled_hr}
  top consumer:         ${goto 200}[${top_mem name 1}-${top_mem pid 1}]                                 ${goto 500}(${top_mem mem 1}%)
  RAM usage:            ${goto 200}${mem}                       ${goto 300}/ ${memmax}                  ${goto 500}(${memperc}%)                        ${goto 600}${membar 4}
  buffers:              ${goto 200}${buffers}                   ${goto 300}/ ${memmax}
  cache:                ${goto 200}${cached}                    ${goto 300}/ ${memmax}
  swap usage:           ${goto 200}${swap}                      ${goto 300}/ ${swapmax}                 ${goto 500}(${swapperc}%)                       ${goto 600}${swapbar 4}

storage  ${stippled_hr}
  /                     ${goto 200}${fs_used /}                 ${goto 300}/ ${fs_size /}               ${goto 500}(${fs_used_perc /}%)                 ${goto 600}${fs_bar /}
  /boot                 ${goto 200}${fs_used /boot}             ${goto 300}/ ${fs_size /boot}           ${goto 500}(${fs_used_perc /boot}%)             ${goto 600}${fs_bar /boot}
  /boot/efi             ${goto 200}${fs_used /boot/efi}         ${goto 300}/ ${fs_size /boot/efi}       ${goto 500}(${fs_used_perc /boot/efi}%)         ${goto 600}${fs_bar 6,2390 /boot/efi}
  /usr                  ${goto 200}${fs_used /usr}              ${goto 300}/ ${fs_size /usr}            ${goto 500}(${fs_used_perc /usr}%)              ${goto 600}${fs_bar /usr}
  /var                  ${goto 200}${fs_used /var}              ${goto 300}/ ${fs_size /var}            ${goto 500}(${fs_used_perc /var}%)              ${goto 600}${fs_bar /var}
  /var/log              ${goto 200}${fs_used /var/log}          ${goto 300}/ ${fs_size /var/log}        ${goto 500}(${fs_used_perc /var/log}%)          ${goto 600}${fs_bar /var/log}
  /var/cache            ${goto 200}${fs_used /var/cache}        ${goto 300}/ ${fs_size /var/cache}      ${goto 500}(${fs_used_perc /var/cache}%)        ${goto 600}${fs_bar /var/cache}
  /var/tmp              ${goto 200}${fs_used /var/tmp}          ${goto 300}/ ${fs_size /var/tmp}        ${goto 500}(${fs_used_perc /var/tmp}%)          ${goto 600}${fs_bar /var/tmp}
  /home                 ${goto 200}${fs_used /home}             ${goto 300}/ ${fs_size /home}           ${goto 500}(${fs_used_perc /home}%)             ${goto 600}${fs_bar /home}
  read:                 ${goto 200}${diskio_read /dev/nvme0n1}
    ${diskiograph_read /dev/nvme0n1}   
    top consumer:       ${goto 200}[${top_io name 1}-${top_io pid 1}]                                   ${goto 500}(${top_io io_read 1})
  write:                ${goto 200}${diskio_write /dev/nvme0n1}
    ${diskiograph_write /dev/nvme0n1}   
    top consumer:       ${goto 200}[${top_io name 1}-${top_io pid 1}]                                   ${goto 500}(${top_io io_write 1})
  temperature:          ${goto 200}${exec temperature storage}°C
    ${execgraph "temperature storage" 150}

network  ${stippled_hr}
  receive:              ${goto 200}${downspeed wlan0}
    ${downspeedgraph wlan0}   
  send:                 ${goto 200}${upspeed wlan0}
    ${upspeedgraph wlan0}   
  temperature:          ${goto 200}${exec temperature net}°C
    ${execgraph "temperature net" 150}
]]

