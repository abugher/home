    default_color = 'f0fff0',
    default_graph_height = 20,
    default_outline_color = 'ff0000',
    default_shade_color = 'ff0000',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'DejaVu Sans Mono:size=12',
    gap_x = 0,
    gap_y = 0,
    minimum_height = 1440,
    maximum_height = 1440,
    minimum_width = 2550,
    maximum_width = 2550,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
