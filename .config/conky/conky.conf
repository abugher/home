-- Tabs can be used to create columns with variable width text.  Graphs with no
-- width parameter fill the remainder of the line.  Multiple graphs per line
-- seem to overflow the line.
--
-- I have the CPU graphs in a 4x4 grid, using fixed widths.  That will only
-- look right on one screen resolution.  Find a better way to make columns out
-- of graphs, if possible.

-- ${goto} is a potential alternative to ${tab}.  It may be easier to use.

-- Bars generally look good in line with text.  Graphs are misaligned with
-- text.  If this can be fixed, columns will be more consistent, and more lines
-- can fit.

-- top* values are space padded, making columns look funny.
-- 
-- ${top cpu 1} disagrees with `top`.  This may be the difference between
-- percent of one core and percent of all cores.
--
-- I do not see a way to list the top consumer of network I/O.

-- Don't use ${acpitemp}.
-- 
-- ${acpitemp} seems to show only thermal zone zero.  Notably, thermal zone
-- zero thinks it is below room temperature.  Seems unlikely.
--
--   0 aaron@obsidian:~/.config/conky$ for zone in /sys/class/thermal/thermal_zone*; do printf '%-15s-  %s°C\n' "$(cat "${zone}/type")" "$(sed -E 's/(...)$/.\1/' < "${zone}/temp")"; done
-- acpitz         -  16.800°C
-- acpitz         -  27.800°C
-- x86_pkg_temp   -  46.000°C
-- iwlwifi_1      -  34.000°C
--   0 aaron@obsidian:~/.config/conky$
--
-- From skimming the web, acpitz should be on the motherboard near the CPU
-- socket, and x86_pkg_temp should be on/in the CPU die.  iwlwifi_1 is
-- presumably the wireless card.
--
-- The thermal zone temperatures are in thousandths of a degree.  So this
-- doesn't quite work:
--
-- ${tail /sys/class/thermal/thermal_zone2/temp 1}°C
--
-- Lua scripting requires writing more files.  That might be the only way to
-- insert a decimal point.
--
-- `smartctl /dev/nvme0n1 -a` includes temperature information for the SSD, but
-- requires privileges.

--    ${cpugauge cpu1} ${cpugauge cpu2} ${cpugauge cpu3} ${cpugauge cpu4}
--    ${cpugauge cpu5} ${cpugauge cpu6} ${cpugauge cpu7} ${cpugauge cpu8}
--    ${cpugauge cpu9} ${cpugauge cpu10} ${cpugauge cpu11} ${cpugauge cpu12}
--    ${cpugauge cpu13} ${cpugauge cpu14} ${cpugauge cpu15} ${cpugauge cpu16}

conky.text = [[
OS:

  uptime: ${tab 100}${uptime}
  update status: ${tab 100}${tail /var/log/update_debian.ret 1}


processing:
  
  CPU
    ${cpugraph cpu1 20,620} ${cpugraph cpu2 20,620} ${cpugraph cpu3 20,620} ${cpugraph cpu4 20,620}
    ${cpugraph cpu5 20,620} ${cpugraph cpu6 20,620} ${cpugraph cpu7 20,620} ${cpugraph cpu8 20,620}
    ${cpugraph cpu9 20,620} ${cpugraph cpu10 20,620} ${cpugraph cpu11 20,620} ${cpugraph cpu12 20,620}
    ${cpugraph cpu13 20,620} ${cpugraph cpu14 20,620} ${cpugraph cpu15 20,620} ${cpugraph cpu16 20,620}
    top consumer: ${tab 100}[${top name 1}-${top pid 1}] ${tab 250}(${top cpu 1}%)

  load: ${tab 100}${loadavg 1}, ${loadavg 2}, ${loadavg 3} 
    ${loadgraph}

  processes:
    total: ${tab 100}${processes}  
    running: ${tab 100}${running_processes}

  threads:
    total: ${tab 100}${threads}  
    running: ${tab 100}${running_threads}


memory:
  
  top consumer: ${tab 100}[${top_mem name 1}-${top_mem pid 1}] ${tab 250}(${top_mem mem 1}%)
  RAM usage: ${tab 100}${mem}${tab 160}/${tab 20}${memmax} ${tab 250}(${memperc}%) ${tab 100}${membar 4}
  buffers: ${tab 100}${buffers}${tab 160}/${tab 20}${memmax}
  cache: ${tab 100}${cached}${tab 160}/${tab 20}${memmax}
  swap usage: ${tab 100}${swap}${tab 160}/${tab 20}${swapmax} ${tab 250}(${swapperc}%) ${tab 100}${swapbar 4}


storage:

  / ${tab 100}${fs_used /}${tab 160}/${tab 20}${fs_size /} ${tab 250}(${fs_used_perc /}%) ${tab 100}${fs_bar /}
  /boot ${tab 100}${fs_used /boot}${tab 160}/${tab 20}${fs_size /boot} ${tab 250}(${fs_used_perc /boot}%) ${tab 100}${fs_bar /boot}
  /boot/efi ${tab 100}${fs_used /boot/efi}${tab 160}/${tab 20}${fs_size /boot/efi} ${tab 250}(${fs_used_perc /boot/efi}%) ${tab 100}${fs_bar 6,2390 /boot/efi}
  /usr ${tab 100}${fs_used /usr}${tab 160}/${tab 20}${fs_size /usr} ${tab 250}(${fs_used_perc /usr}%) ${tab 100}${fs_bar /usr}
  /var ${tab 100}${fs_used /var}${tab 160}/${tab 20}${fs_size /var} ${tab 250}(${fs_used_perc /var}%) ${tab 100}${fs_bar /var}
  /var/log ${tab 100}${fs_used /var/log}${tab 160}/${tab 20}${fs_size /var/log} ${tab 250}(${fs_used_perc /var/log}%) ${tab 100}${fs_bar /var/log}
  /var/cache ${tab 100}${fs_used /var/cache}${tab 160}/${tab 20}${fs_size /var/cache} ${tab 250}(${fs_used_perc /var/cache}%) ${tab 100}${fs_bar /var/cache}
  /var/tmp ${tab 100}${fs_used /var/tmp}${tab 160}/${tab 20}${fs_size /var/tmp} ${tab 250}(${fs_used_perc /var/tmp}%) ${tab 100}${fs_bar /var/tmp}
  /home ${tab 100}${fs_used /home}${tab 160}/${tab 20}${fs_size /home} ${tab 250}(${fs_used_perc /home}%) ${tab 100}${fs_bar /home}

  SSD read ${tab 100}${diskio_read /dev/nvme0n1}
    ${diskiograph_read /dev/nvme0n1}   
    top consumer: ${tab 100}[${top_io name 1}-${top_io pid 1}] ${tab 250}(${top_io io_read 1}%)

  SSD write ${tab 100}${diskio_write /dev/nvme0n1}
    ${diskiograph_write /dev/nvme0n1}   
    top consumer: ${tab 100}[${top_io name 1}-${top_io pid 1}] ${tab 250}(${top_io io_write 1}%)


network:

  WiFi receive ${tab 100}${downspeed wlan0}
    ${downspeedgraph wlan0}   

  WiFi send ${tab 100}${upspeed wlan0}
    ${upspeedgraph wlan0}   
]]

